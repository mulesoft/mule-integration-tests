upstreamProjects:
  Mule-runtime/mule/support/4.4.x
# MULE-18045: Comment public setting to get raml-parser 2 from private repo until it is released in a public repo
# "mavenSettingsXmlId" : "mule-runtime-maven-settings-MuleSettings",
mavenAdditionalArgs: -Dmule.scheduler.alwaysShowSchedulerCreationLocation -pl soap-connect/integration-tests -am
additionalConfigFileMetadataProviderList:
  - fileId: mule-runtime-maven-settings-MuleSettings
    variable: org.mule.maven.client.api.SettingsSupplierFactory.userSettings
projectType: runtime
agentLabel: windows2019-heavy
buildTimeoutTime : 30
buildTimeoutUnit : "MINUTES"
mavenTestGoal: "install
    -Dmaven.javadoc.skip
    -Dmaven.buildNumber.skip
    -Drevapi.skip
    -DmuleModule.analyze.skip
    -Denforcer.skip
    -Dformatter.skip
    -Dmaven.gitcommitid.skip
    -Dgpg.skip=true -DskipGpg=true
    -Dinvoker.writeJunitReport=true
    -Dmule.extensions.disableMuleVersionSuffixValidation=true
    -e"

